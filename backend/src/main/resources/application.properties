# ===================== Server =====================
server.port=8080

# ===================== Database =====================
# --- MySQL (default) ---
spring.datasource.url=jdbc:mysql://localhost:3306/music_clone_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- To use H2 in-memory instead for quick local testing, comment the MySQL
#     block above and uncomment this block ---
# spring.datasource.url=jdbc:h2:mem:musiccloneddb
# spring.datasource.driver-class-name=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=
# spring.h2.console.enabled=true

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===================== File Upload =====================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

app.file.song-upload-dir=uploads/songs
app.file.cover-upload-dir=uploads/covers

# ===================== JWT =====================
# 256-bit (or longer) secret - replace this with your own secure random value in production
app.jwt.secret=ChangeThisToASecureRandomBase64EncodedSecretKeyThatIsLongEnough123456
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# ===================== CORS =====================
# Origin of your frontend (React/Vue/etc). Adjust as needed or set to * for dev only.
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# ===================== Logging =====================
logging.level.org.springframework.security=INFO
logging.level.com.musicclone.backend=DEBUG
